services:
  newsnow-plus:
    build: .
    ports:
      - '4444:4444'
    volumes:
      - newsnow_plus_data:/usr/app/.data
    environment:
      - G_CLIENT_ID=
      - G_CLIENT_SECRET=
      - JWT_SECRET=
      - INIT_TABLE=true
      - ENABLE_CACHE=true

volumes:
  newsnow_plus_data:
    name: newsnow_plus_data
